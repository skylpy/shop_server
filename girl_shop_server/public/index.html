<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Flutter女装商城</title>
    <style>
        html,body{
            min-height:100vh;
            margin:0;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:linear-gradient(135deg,#111827,#1d4ed8);
            color:#ffffff;
        }
        body{
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }
        .card{
            width:min(720px,100%);
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.18);
            border-radius:24px;
            padding:32px;
            box-shadow:0 20px 60px rgba(0,0,0,0.2);
        }
        h1{
            margin:0 0 12px;
            font-size:36px;
        }
        p{
            margin:0 0 24px;
            color:rgba(255,255,255,0.82);
            line-height:1.8;
        }
        .actions{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:24px;
        }
        a{
            display:inline-block;
            text-decoration:none;
            color:#0f172a;
            background:#ffffff;
            padding:12px 18px;
            border-radius:12px;
            font-weight:700;
        }
        .secondary{
            background:rgba(255,255,255,0.16);
            color:#ffffff;
            border:1px solid rgba(255,255,255,0.2);
        }
        ul{
            margin:0;
            padding-left:18px;
            color:rgba(255,255,255,0.84);
            line-height:1.8;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Girl Shop 商业后台演示项目</h1>
    <p>当前服务已升级为基于 Node.js + Express + MongoDB 的商城后台示例，提供商品、用户、订单、分类、轮播等运营管理能力，并兼容原有 Flutter 商城接口。</p>
    <div class="actions">
        <a href="/admin/">进入后台管理系统</a>
        <a href="/api/health" class="secondary">查看健康检查</a>
    </div>
    <ul>
        <li>后台地址：/admin/</li>
        <li>默认管理员：admin / Admin@123456</li>
        <li>数据库连接：通过环境变量 MONGODB_URI 配置</li>
    </ul>
</div>
</body>
</html>
